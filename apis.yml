  - Foreign Policy
  - Diplomatic
  - Country Information
  - Public Safety
apis:
  - aid: state-dept-consular-affairs
    name: State Department Consular Affairs API
    description: >
      Public REST API providing travel advisories for all countries with alert
      levels (Exercise Normal Precautions, Exercise Increased Caution, Reconsider
      Travel, Do Not Travel), country-specific travel information, passport
      acceptance facility locations searchable by ZIP code or state, and
      passport issuance statistics by fiscal and calendar year.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cadataapi.state.gov/
    baseURL: https://cadataapi.state.gov
    tags:
      - Travel Advisories
      - Passports
      - Country Information
      - Consular Affairs
    properties:
      - type: Documentation
        url: https://cadataapi.state.gov/
      - type: OpenAPI
        url: https://cadataapi.state.gov/
    contact:
      - FN: US Department of State Consular Affairs
        url: https://travel.state.gov/
  - aid: state-dept-travel-advisories
    name: State Department Travel Advisories
    description: >
      REST endpoint returning current travel advisories for all countries
      worldwide. Each advisory includes the country name, alert level (1-4),
      publication date, last updated timestamp, and detailed HTML summary of
      risks including crime, terrorism, health threats, civil unrest, and
      kidnapping. Individual country advisories can be retrieved by country code.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://travel.state.gov/content/travel/en/traveladvisories/traveladvisories.html/
    baseURL: https://cadataapi.state.gov
    tags:
      - Travel Advisories
      - Country Safety
      - Risk Assessment
    properties:
      - type: Documentation
        url: https://cadataapi.state.gov/
      - type: OpenAPI
        url: https://cadataapi.state.gov/
    contact:
      - FN: US Department of State Travel
        url: https://travel.state.gov/
