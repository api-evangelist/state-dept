aid: state-dept
name: State Department
description: >
  The US Department of State provides public REST APIs for accessing consular
  affairs data including travel advisories by country and risk level, country
  travel information, passport acceptance facility locations, passport issuance
  statistics, and geopolitical reference data. The Consular Affairs Data API
  (cadataapi.state.gov) offers open, unauthenticated endpoints covering all
  countries with real-time travel advisory updates across four alert levels.
  Additional historical diplomatic records are available through the Foreign
  Relations of the United States (FRUS) catalog API.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/state-dept/refs/heads/main/apis.yml
